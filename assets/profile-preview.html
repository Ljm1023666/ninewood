<!DOCTYPE html>
<html lang="zh-CN" data-appearance="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>个人中心预览 — Ninewood</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Montserrat:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<style>
  :root {
    --font-family: 'Montserrat', 'Inter', system-ui, -apple-system, sans-serif;
    --sidebar-w: 72px;
    --primary-start: #667eea;
    --primary-end: #764ba2;
    --accent-color: #667eea;
    --bg-primary: #0a0a1a;
    --bg-secondary: #12122a;
    --bg-tertiary: #1a1a3a;
    --bg-card: rgba(102, 126, 234, 0.08);
    --text-primary: #e0e0f0;
    --text-secondary: #b0b0d0;
    --text-muted: #8080a8;
    --border-color: rgba(102, 126, 234, 0.2);
    --z-max: 400;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    height: 100%; width: 100%;
    font-family: var(--font-family);
    background: var(--bg-primary);
    color: var(--text-primary);
    overflow: hidden;
  }
  .glass-card {
    background: rgba(102, 126, 234, 0.08);
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    border: 1px solid rgba(102, 126, 234, 0.2);
    border-radius: 16px;
  }

  /* ── 封面开场动画 ── */
  #intro-overlay {
    position: fixed; inset: 0; z-index: 400;
    background: var(--bg-primary);
    cursor: pointer;
    transition: opacity 0.3s;
  }
  #intro-overlay.hidden { opacity: 0; pointer-events: none; }
  #intro-cover {
    position: absolute; top: 0; left: 0;
    width: 100vw; height: 100vh;
    background-size: cover; background-position: center;
    box-shadow: 0 24px 60px rgba(0,0,0,0.35);
    transition: all 0.82s cubic-bezier(0.32, 0.72, 0, 1);
  }
  #intro-cover.shrunk {
    left: var(--sidebar-w);
    width: calc(100vw - var(--sidebar-w));
    height: calc((100vw - var(--sidebar-w)) * 9 / 16);
  }
  #intro-text {
    position: absolute; left: 1rem; right: 1rem; z-index: 10;
    text-align: center; pointer-events: none; bottom: 60%;
    transition: opacity 0.38s, transform 0.38s;
  }
  #intro-text.fade { opacity: 0; transform: translateY(12px); }
  #intro-hint {
    position: absolute; bottom: 3rem; left: 0; right: 0;
    text-align: center; color: rgba(255,255,255,0.4);
    font-size: 13px; letter-spacing: 2px;
    transition: opacity 0.38s;
  }
  #intro-hint.fade { opacity: 0; }

  /* 滚动条 */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 2px; }
</style>
</head>
<body class="flex">

<!-- 模拟侧边栏 -->
<aside class="w-[72px] shrink-0 h-full flex flex-col items-center gap-4 py-6 border-r border-[var(--border-color)] bg-[var(--bg-primary)]">
  <div class="w-10 h-10 rounded-xl flex items-center justify-center text-white font-black text-sm" style="background:linear-gradient(135deg,var(--primary-start),var(--primary-end))">9</div>
  <div class="flex-1 flex flex-col gap-3 mt-8">
    <div class="w-10 h-10 rounded-xl flex items-center justify-center bg-white/10 text-white/50 text-lg">🏠</div>
    <div class="w-10 h-10 rounded-xl flex items-center justify-center bg-white/10 text-white/50 text-lg">🔍</div>
    <div class="w-10 h-10 rounded-xl flex items-center justify-center bg-white/10 text-white/50 text-lg">💬</div>
    <div class="w-10 h-10 rounded-xl flex items-center justify-center bg-white/15 text-white text-lg ring-1 ring-[var(--accent-color)]">👤</div>
    <div class="w-10 h-10 rounded-xl flex items-center justify-center bg-white/10 text-white/50 text-lg">⚙</div>
  </div>
</aside>

<!-- 封面开场动画 -->
<div id="intro-overlay" onclick="shrinkIntro()">
  <div id="intro-cover" style="background-image:url('https://images.unsplash.com/photo-1506905925346-21bda4d32df4?auto=format&fit=crop&w=1600&q=80')"></div>
  <div id="intro-text">
    <p style="font-size:26px;font-weight:700;color:rgba(255,255,255,0.95);letter-spacing:4px;text-shadow:0 2px 24px rgba(0,0,0,0.6)">星辰旅人</p>
    <p style="margin-top:12px;font-size:13px;font-weight:500;letter-spacing:3px;color:rgba(255,255,255,0.55)">轻触收起</p>
  </div>
  <div id="intro-hint">点击封面任意位置收起</div>
</div>

<!-- 主内容区 -->
<div id="main-content" class="flex-1 h-full overflow-y-auto relative" style="opacity:0;transition:opacity 0.2s">

  <!-- 背景层 -->
  <div class="pointer-events-none absolute inset-0 z-0 bg-cover bg-center" style="background-image:url('https://images.unsplash.com/photo-1506905925346-21bda4d32df4?auto=format&fit=crop&w=1600&q=80')"></div>
  <div class="pointer-events-none absolute inset-0 z-[1] bg-gradient-to-b from-black/50 via-[#0a0a1a]/85 to-[#0a0a1a]"></div>

  <!-- 内容 -->
  <div class="relative z-10 flex flex-col items-center min-h-full justify-center gap-4 px-4 pb-28 pt-16 max-w-2xl mx-auto">

    <!-- 资料卡 -->
    <div class="glass-card p-5 w-full">
      <div class="flex items-start gap-3">
        <!-- 头像 -->
        <div class="flex h-[88px] w-[88px] shrink-0 items-center justify-center overflow-hidden rounded-2xl border-2 border-white/25 text-2xl font-bold shadow-lg"
             style="box-shadow: 0 0 24px rgba(102,126,234,0.33), 0 8px 24px rgba(0,0,0,0.35)">
          <img src="https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?auto=format&fit=crop&w=200&q=80" alt="" class="h-full w-full object-cover">
        </div>
        <div class="min-w-0 flex-1 pt-0.5">
          <h2 class="truncate text-lg font-extrabold tracking-tight">星辰旅人</h2>
          <span class="mt-1 inline-block rounded px-2 py-0.5 text-[11px] font-semibold"
                style="color:#fff;border:1px solid rgba(102,126,234,0.4);background:rgba(102,126,234,0.13)">
            高级认证
          </span>
        </div>
      </div>
      <p class="mt-3 text-xs leading-relaxed text-white/75">
        自由设计师 / 全栈开发者。热爱创造，追求极致体验。接各类设计外包与前端开发项目。
      </p>
      <!-- 操作按钮 -->
      <div class="mt-4 flex gap-2">
        <button class="flex items-center gap-2 rounded-xl border px-4 py-3 text-xs font-semibold backdrop-blur-sm border-white/20 bg-white/10 text-white hover:bg-white/[0.18] transition">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/></svg>
          编辑资料
        </button>
      </div>
    </div>

    <!-- 统计数据行 -->
    <div class="flex gap-3 w-full">
      <div class="glass-card flex-1 p-4 flex flex-col items-center gap-1 transition hover:bg-white/[0.12] cursor-pointer">
        <span class="text-2xl font-extrabold tabular-nums">128</span>
        <span class="text-xs text-white/60">关注</span>
      </div>
      <div class="glass-card flex-1 p-4 flex flex-col items-center gap-1 transition hover:bg-white/[0.12] cursor-pointer">
        <span class="text-2xl font-extrabold tabular-nums">356</span>
        <span class="text-xs text-white/60">粉丝</span>
      </div>
      <div class="glass-card flex-1 p-4 flex flex-col items-center gap-1">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="var(--accent-color)" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
        <span class="text-xs font-bold" style="color:var(--accent-color)">高级认证</span>
        <div class="mt-1 w-full h-1 rounded-full bg-white/10 overflow-hidden">
          <div class="h-full rounded-full" style="width:75%;background:var(--accent-color)"></div>
        </div>
      </div>
    </div>

    <!-- 详细数据 2x2 -->
    <div class="glass-card p-4 w-full">
      <div class="grid grid-cols-2 gap-2">
        <div class="flex items-center gap-3 rounded-xl border border-white/10 bg-white/5 p-3">
          <div class="flex h-9 w-9 shrink-0 items-center justify-center rounded-lg" style="background:rgba(52,211,153,0.13);color:#34d399">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
          </div>
          <div class="min-w-0">
            <p class="text-[11px] text-white/55">信誉积分</p>
            <p class="truncate text-sm font-extrabold tabular-nums">92</p>
          </div>
        </div>
        <div class="flex items-center gap-3 rounded-xl border border-white/10 bg-white/5 p-3">
          <div class="flex h-9 w-9 shrink-0 items-center justify-center rounded-lg" style="background:rgba(248,113,113,0.13);color:#f87171">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
          </div>
          <div class="min-w-0">
            <p class="text-[11px] text-white/55">本月抢单</p>
            <p class="truncate text-sm font-extrabold tabular-nums">2/3</p>
          </div>
        </div>
        <div class="flex items-center gap-3 rounded-xl border border-white/10 bg-white/5 p-3">
          <div class="flex h-9 w-9 shrink-0 items-center justify-center rounded-lg" style="background:rgba(102,126,234,0.13);color:var(--accent-color)">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>
          </div>
          <div class="min-w-0">
            <p class="text-[11px] text-white/55">完成订单</p>
            <p class="truncate text-sm font-extrabold tabular-nums">47</p>
          </div>
        </div>
        <div class="flex items-center gap-3 rounded-xl border border-white/10 bg-white/5 p-3">
          <div class="flex h-9 w-9 shrink-0 items-center justify-center rounded-lg" style="background:rgba(196,181,253,0.13);color:#c4b5fd">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
          </div>
          <div class="min-w-0">
            <p class="text-[11px] text-white/55">关注/粉丝比</p>
            <p class="truncate text-sm font-extrabold tabular-nums">36%</p>
          </div>
        </div>
      </div>
    </div>

    <!-- 快捷入口：6个图标 -->
    <div class="flex gap-3 w-full">
      <div class="glass-card flex-1 p-3 flex flex-col items-center gap-1 transition hover:bg-white/[0.12] cursor-pointer">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="text-white/90"><circle cx="12" cy="8" r="6"/><path d="M15.477 12.89 17 22l-5-3-5 3 1.523-9.11"/></svg>
        <span class="text-[11px] text-white/60">认证</span>
      </div>
      <div class="glass-card flex-1 p-3 flex flex-col items-center gap-1 transition hover:bg-white/[0.12] cursor-pointer">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="text-white/90"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/></svg>
        <span class="text-[11px] text-white/60">需求</span>
      </div>
      <div class="glass-card flex-1 p-3 flex flex-col items-center gap-1 transition hover:bg-white/[0.12] cursor-pointer">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="text-white/90"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
        <span class="text-[11px] text-white/60">收藏</span>
      </div>
      <div class="glass-card flex-1 p-3 flex flex-col items-center gap-1 transition hover:bg-white/[0.12] cursor-pointer">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="text-white/90"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"/><path d="M3 6h18"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
        <span class="text-[11px] text-white/60">订单</span>
      </div>
      <div class="glass-card flex-1 p-3 flex flex-col items-center gap-1 transition hover:bg-white/[0.12] cursor-pointer">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="text-white/90"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        <span class="text-[11px] text-white/60">消息</span>
      </div>
      <div class="glass-card flex-1 p-3 flex flex-col items-center gap-1 transition hover:bg-white/[0.12] cursor-pointer">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="text-white/90"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        <span class="text-[11px] text-white/60">设置</span>
      </div>
    </div>
  </div>
</div>

<script>
let introHidden = false;
function shrinkIntro() {
  if (introHidden) return;
  const overlay = document.getElementById('intro-overlay');
  const cover = document.getElementById('intro-cover');
  const text = document.getElementById('intro-text');
  const hint = document.getElementById('intro-hint');
  const main = document.getElementById('main-content');

  // 第一次点击：缩小封面
  if (!cover.classList.contains('shrunk')) {
    cover.classList.add('shrunk');
    text.classList.add('fade');
    hint.classList.add('fade');
    main.style.opacity = '1';
    setTimeout(() => { overlay.classList.add('hidden'); }, 900);
    introHidden = true;
  }
}
</script>
</body>
</html>
