version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ninewood
      POSTGRES_PASSWORD: ninewood_secret
      POSTGRES_DB: ninewood
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ninewood']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5

  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    ports:
      - '3001:3001'
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://ninewood:ninewood_secret@postgres:5432/ninewood
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      SENTRY_DSN: ${SENTRY_DSN:-}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - uploads:/app/uploads

  client:
    build:
      context: .
      dockerfile: client-react/Dockerfile
    ports:
      - '80:80'
    depends_on:
      - server

volumes:
  pgdata:
  uploads:
