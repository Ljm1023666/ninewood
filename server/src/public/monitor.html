<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>九木 · 端口监控</title>
<style>
  :root {
    --bg: #0a0a14;
    --card: #111122;
    --border: #1e1e3a;
    --text: #e0e0f0;
    --muted: #8888aa;
    --green: #22c55e;
    --red: #ef4444;
    --yellow: #f59e0b;
    --blue: #3b82f6;
    --purple: #8b5cf6;
    --teal: #10b981;
    --amber: #f59e0b;
    --accent: #6366f1;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: clamp(16px, 3vh, 40px);
    gap: clamp(8px, 1.5vh, 20px);
  }
  header {
    display: flex; align-items: center; justify-content: space-between;
    width: 100%; max-width: 1200px;
  }
  h1 { font-size: clamp(1.2rem, 2vw, 2rem); font-weight: 800; color: var(--accent); }
  .sub { color: var(--muted); font-size: 0.85em; }
  .actions { display: flex; gap: 8px; }
  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 6px 14px; border: 1px solid var(--border);
    border-radius: 8px; background: var(--card); color: var(--text);
    font-size: 0.85em; cursor: pointer; transition: all .2s;
  }
  .btn:hover { border-color: var(--accent); }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-primary { background: var(--accent); border-color: var(--accent); }
  .status-bar { display: flex; align-items: center; gap: 8px; font-size: 0.85em; width: 100%; max-width: 1200px; }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
  .status-dot.online { background: var(--green); animation: pulse 2s infinite; }
  .status-dot.offline { background: var(--red); }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }
  .grid {
    display: grid; gap: clamp(6px, 1vh, 12px);
    grid-template-columns: repeat(auto-fit, minmax(min(180px, 100%), 1fr));
    width: 100%; max-width: 1200px;
  }
  .card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 12px; padding: clamp(10px, 1.5vh, 16px);
    display: flex; flex-direction: column; gap: 8px;
  }
  .card-header { display: flex; align-items: center; justify-content: space-between; }
  .card-title { font-size: 0.9em; font-weight: 600; display: flex; align-items: center; gap: 6px; }
  .card-icon { font-size: 1.2em; }
  .card-port { font-size: clamp(1.2rem, 1.6vw, 1.8rem); font-weight: 700; }
  .badge {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 2px 8px; border-radius: 6px; font-size: 0.75em; font-weight: 600;
  }
  .badge-success { background: #22c55e20; color: var(--green); border: 1px solid #22c55e40; }
  .badge-error { background: #ef444420; color: var(--red); border: 1px solid #ef444440; }
  .badge-warning { background: #f59e0b20; color: var(--yellow); border: 1px solid #f59e0b40; }
  .ms { font-size: 0.75em; color: var(--muted); }
  .error-msg { font-size: 0.7em; color: var(--red); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .row { display: flex; align-items: center; justify-content: space-between; }
  .bottom {
    display: flex; gap: clamp(6px, 1vh, 12px);
    width: 100%; max-width: 1200px; flex: 1; min-height: 0;
  }
  .panel {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 12px; padding: clamp(10px, 1.5vh, 16px);
    display: flex; flex-direction: column; flex: 1; min-width: 0;
  }
  .panel.third { flex: 0 0 30%; }
  .panel-title { font-size: 0.9em; font-weight: 600; margin-bottom: 12px; }
  .log-item {
    display: flex; align-items: center; justify-content: space-between;
    padding: 8px 0; border-bottom: 1px solid var(--border);
  }
  .log-item:last-child { border-bottom: none; }
  .log-name { font-size: 0.85em; }
  .log-meta { font-size: 0.75em; color: var(--muted); }
  canvas { width: 100%; height: 100%; min-height: 200px; }
  .chart-wrap { flex: 1; min-height: 0; position: relative; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .spin { animation: spin 1s linear infinite; display: inline-block; }
  .toast {
    position: fixed; bottom: 20px; right: 20px;
    background: var(--card); border: 1px solid var(--border);
    padding: 12px 20px; border-radius: 10px; font-size: 0.85em;
    opacity: 0; transform: translateY(10px); transition: all .3s;
    pointer-events: none; z-index: 999;
  }
  .toast.show { opacity: 1; transform: translateY(0); }
</style>
</head>
<body>

<header>
  <div>
    <h1>● 端口监控</h1>
    <p class="sub">Express 独立监控页 — 即使前端挂了也能访问</p>
  </div>
  <div class="actions">
    <button class="btn btn-primary" id="btnStartAll" style="display:none" onclick="startAll()">
      &#9654; 启动全部
    </button>
    <button class="btn" onclick="refresh()">&#8635; 刷新</button>
  </div>
</header>

<div class="status-bar" id="statusBar"></div>

<div class="grid" id="cards"></div>

<div class="bottom">
  <div class="panel">
    <div class="panel-title">&#9783; 响应时间趋势 (ms)</div>
    <div class="chart-wrap"><canvas id="chart"></canvas></div>
  </div>
  <div class="panel third">
    <div class="panel-title">&#9200; 最近检查记录</div>
    <div id="log"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const COLORS = {
  'Express 服务器': '#3b82f6',
  'PostgreSQL': '#8b5cf6',
  'Redis': '#ef4444',
  '语义分类器': '#10b981',
  'Vite Dev Server': '#f59e0b',
};

const HISTORY_MAX = 60;
let history = [];

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2500);
}

async function refresh() {
  try {
    const res = await fetch('/api/health/services');
    const data = await res.json();
    render(data);
  } catch (e) {
    toast('获取数据失败: ' + e.message);
  }
}

function render(data) {
  // Status bar
  const bar = document.getElementById('statusBar');
  const allUp = data.status === 'healthy';
  bar.innerHTML = `
    <span class="status-dot ${allUp ? 'online' : 'offline'}"></span>
    <span style="color:${allUp ? 'var(--green)' : 'var(--yellow)'}">
      ${allUp ? '全部健康' : '部分降级'}
    </span>
    <span class="ms">· 上次检查: ${new Date(data.timestamp).toLocaleTimeString('zh-CN')} · 总耗时 ${data.totalCheckTime}ms</span>
  `;

  // Cards
  const grid = document.getElementById('cards');
  grid.innerHTML = data.services.map(svc => {
    const online = svc.status === 'online';
    const badgeCls = online ? 'badge-success' : svc.status === 'error' ? 'badge-warning' : 'badge-error';
    const badgeText = online ? '在线' : svc.status === 'error' ? '异常' : '离线';
    const dot = online ? '<span class="status-dot online"></span>' : '<span class="status-dot offline"></span>';
    const isExpress = svc.name === 'Express 服务器';
    const restartBtn = isExpress
      ? `<button class="btn" disabled title="Express 无法自我重启">手动重启</button>`
      : `<button class="btn" onclick="restartOne('${svc.name}')" id="btn-${svc.name.replace(/\s/g,'')}">&#8635; 重启</button>`;
    return `
      <div class="card">
        <div class="card-header">
          <span class="card-title">
            <span class="card-icon">${iconFor(svc.name)}</span>${svc.name}
          </span>
          ${dot}
        </div>
        <div class="row">
          <span class="card-port">${svc.port}</span>
          <div style="display:flex;flex-direction:column;align-items:end;gap:4px">
            <span class="badge ${badgeCls}">${badgeText}</span>
            ${online ? `<span class="ms">${svc.responseTime}ms</span>` : ''}
          </div>
        </div>
        ${svc.error ? `<div class="error-msg" title="${esc(svc.error)}">${esc(svc.error)}</div>` : ''}
        ${restartBtn}
      </div>`;
  }).join('');

  // Show "start all" button if any offline
  const offlineCount = data.services.filter(s => s.status !== 'online').length;
  document.getElementById('btnStartAll').style.display = offlineCount > 0 ? '' : 'none';
  if (offlineCount > 0) {
    document.getElementById('btnStartAll').textContent = `▶ 启动全部 (${offlineCount})`;
  }

  // Log
  const sorted = [...data.services].sort((a, b) => {
    if (a.status !== b.status) return a.status === 'online' ? 1 : -1;
    return b.responseTime - a.responseTime;
  });
  document.getElementById('log').innerHTML = sorted.map(svc => `
    <div class="log-item">
      <div>
        <span class="card-icon">${iconFor(svc.name)}</span>
        <span class="log-name">${svc.name}</span>
        <div class="log-meta">端口 ${svc.port}</div>
      </div>
      <div style="display:flex;align-items:center;gap:8px">
        ${svc.status === 'online' ? `<span class="ms">${svc.responseTime}ms</span>` : ''}
        <span class="badge ${svc.status === 'online' ? 'badge-success' : svc.status === 'error' ? 'badge-warning' : 'badge-error'}">
          ${svc.status === 'online' ? '在线' : svc.status === 'error' ? '异常' : '离线'}
        </span>
      </div>
    </div>
  `).join('');

  // Update history
  const time = new Date().toLocaleTimeString('zh-CN', { hour12: false });
  const point = { time };
  for (const svc of data.services) {
    if (svc.status === 'online') point[svc.name] = svc.responseTime;
  }
  history.push(point);
  if (history.length > HISTORY_MAX) history = history.slice(-HISTORY_MAX);
  drawChart(data);
}

function iconFor(name) {
  const m = { 'Express 服务器':'🖥','PostgreSQL':'🗄','Redis':'⚡','语义分类器':'🌐','Vite Dev Server':'🔧' };
  return m[name] || '📡';
}

function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/"/g,'&quot;'); }

function drawChart(data) {
  const canvas = document.getElementById('chart');
  const parent = canvas.parentElement;
  canvas.width = parent.clientWidth * (window.devicePixelRatio || 1);
  canvas.height = parent.clientHeight * (window.devicePixelRatio || 1);
  const ctx = canvas.getContext('2d');
  const w = canvas.width, h = canvas.height;
  ctx.clearRect(0, 0, w, h);

  const onlineSvcs = data.services.filter(s => s.status === 'online');
  if (history.length < 2) {
    ctx.fillStyle = '#8888aa';
    ctx.font = '14px system-ui';
    ctx.textAlign = 'center';
    ctx.fillText('等待更多数据点...', w/2, h/2);
    return;
  }

  const margin = { top: 20, right: 30, bottom: 30, left: 45 };
  const pw = w - margin.left - margin.right;
  const ph = h - margin.top - margin.bottom;

  // Find max value
  let maxVal = 0;
  for (const pt of history) {
    for (const svc of onlineSvcs) {
      const v = pt[svc.name];
      if (typeof v === 'number' && v > maxVal) maxVal = v;
    }
  }
  maxVal = Math.max(maxVal || 10, 10);

  // Grid
  ctx.strokeStyle = '#37415140';
  ctx.lineWidth = 1;
  for (let i = 0; i <= 4; i++) {
    const y = margin.top + (ph / 4) * i;
    ctx.beginPath();
    ctx.moveTo(margin.left, y);
    ctx.lineTo(w - margin.right, y);
    ctx.stroke();
    // Y axis label
    ctx.fillStyle = '#6b7280';
    ctx.font = '10px system-ui';
    ctx.textAlign = 'right';
    ctx.fillText(Math.round(maxVal - (maxVal / 4) * i) + 'ms', margin.left - 6, y + 3);
  }

  // X axis labels
  const xStep = pw / Math.max(history.length - 1, 1);
  ctx.fillStyle = '#6b7280';
  ctx.font = '10px system-ui';
  ctx.textAlign = 'center';
  const showEvery = Math.max(1, Math.floor(history.length / 8));
  for (let i = 0; i < history.length; i += showEvery) {
    const x = margin.left + xStep * i;
    ctx.fillText(history[i].time, x, h - margin.bottom + 14);
  }

  // Lines
  for (const svc of onlineSvcs) {
    const color = COLORS[svc.name] || '#6b7280';
    ctx.strokeStyle = color;
    ctx.lineWidth = 2;
    ctx.beginPath();
    let firstPoint = true;
    for (let i = 0; i < history.length; i++) {
      const v = history[i][svc.name];
      if (typeof v !== 'number') continue;
      const x = margin.left + xStep * i;
      const y = margin.top + ph - (v / maxVal) * ph;
      if (firstPoint) { ctx.moveTo(x, y); firstPoint = false; }
      else ctx.lineTo(x, y);
    }
    ctx.stroke();
  }
}

async function restartOne(name) {
  const btn = document.getElementById('btn-' + name.replace(/\s/g, ''));
  if (btn) { btn.disabled = true; btn.innerHTML = '<span class="spin">&#8635;</span> 重启中'; }
  try {
    const res = await fetch('/api/health/restart/' + encodeURIComponent(name), { method: 'POST' });
    const data = await res.json();
    toast(data.message || (data.ok ? '已发送重启指令' : '重启失败'));
  } catch (e) {
    toast('请求失败: ' + e.message);
  }
  await refresh();
}

async function startAll() {
  const btn = document.getElementById('btnStartAll');
  btn.disabled = true;
  btn.innerHTML = '<span class="spin">&#8635;</span> 启动中...';
  try {
    const res = await fetch('/api/health/start-all', { method: 'POST' });
    const data = await res.json();
    toast(data.message);
  } catch (e) {
    toast('请求失败: ' + e.message);
  }
  await refresh();
}

// Auto-refresh every 5s
refresh();
setInterval(refresh, 5000);

// Resize canvas
window.addEventListener('resize', () => {
  if (history.length > 0) {
    const data = { services: [], status: 'healthy', timestamp: '', totalCheckTime: 0 };
    drawChart(data);
  }
});
</script>
</body>
</html>
