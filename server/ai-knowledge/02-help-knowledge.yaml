  # ═══════════════════════════════════════════════════════════════════════════

  - id: how-to-cert
    category: cert
    tags: [认证, 实名, 资质, 技能认证, 上传证件]
    related: [cert-benefits, credit-system]

    answer:
      summary: "个人主页 → 认证中心 → 选择认证类型 → 提交材料 → 等待审核 1-3 个工作日"
      steps:
        - action: navigate /profile -> 认证中心
        - action: "选择实名认证或技能认证"
        - action: "上传身份证件/技能证书/作品集"
        - action: "等待审核，结果通过消息通知"
      tips:
        - "先完成基础实名认证，再逐级申请更高技能认证"
        - "每次升级认证都会提升信用权重"

  - id: cert-benefits
    category: cert
    tags: [认证等级, NONE, BASIC, INTERMEDIATE, ADVANCED, MASTER, 权重]
    related: [how-to-cert]

    answer:
      summary: "认证分 5 级，等级越高权益越多"
      levels:
        - level: NONE
          title: 未认证
          permissions: [浏览需求, 发布需求]
          restrictions: [无法申请抢单]
        - level: BASIC
          title: 基础认证
          permissions: [基础抢单权限]
          credit_score: 60
        - level: INTERMEDIATE
          title: 中级认证
          permissions: [抢单权重提升, 可同时申请更多订单]
        - level: ADVANCED
          title: 高级认证
          permissions: [搜索结果和推荐中优先展示]
        - level: MASTER
          title: 大师认证
          permissions: [专属标识, 最高信用权重]

  - id: credit-system
    category: feature
    tags: [信用分, 抢单额度, 额度, 积分, 信用, 违约]
    related: [cert-benefits, how-to-cert]

    answer:
      summary: "信用分初始 60，影响抢单权重和搜索排名；抢单额度随时间恢复"
      credit_score:
        initial: 60
        increase: "完成订单并获好评 → +1~3"
        decrease: "违约/纠纷败诉 → -5~20"
        effects:
          - "影响抢单权重"
          - "影响搜索排名"
      snatch_credits:
        initial: 3
        regen: "每 24 小时恢复全部额度"
        refund: "完成订单返还部分额度"
        cost_per_apply: 1
      warnings:
        - type: warning
          content: "频繁申请后不履约或取消订单会导致信用分快速下降，严重者限制功能"

