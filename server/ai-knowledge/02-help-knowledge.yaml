# ── 提示词模板（用于 AI 回答的格式化参考） ──────────────────────────────────

response_templates:

  page_referral:
    pattern: "您要找的是不是「{title}」？{summary} 要帮您跳转过去吗？"
    params: [title, summary]

  operation_guide:
    pattern: "操作步骤如下：\n{steps}\n\n⚠️ {warning}\n💡 {tip}"
    params: [steps, warning, tip]

  rule_info:
    pattern: "这个操作的规则是：{rule}\n\n当前状态：{current_status}"
    params: [rule, current_status]
