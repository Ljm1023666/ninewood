# ── FAQ 知识库 ──────────────────────────────────────────────────────────────

# 每个条目包含：
#   id: 唯一标识（可用于锚点跳转）
#   category: 分类
#   tags: 标签（用于意图匹配）
#   related: 相关 FAQ 的 id 列表
#   intent_map: 用户意图 → 该 FAQ 的映射信号
#   answer: 结构化答案（取代自然语言段落）
#     - summary: 一句话总结
#     - preconditions: 前置条件/须知
#     - steps: 操作步骤 [title, description, params]
#     - warnings: 注意事项
#     - examples: 示例

faq:

  # ═══════════════════════════════════════════════════════════════════════════
  #  发布与管理需求
  # ═══════════════════════════════════════════════════════════════════════════

  - id: how-to-publish
    category: demand
    tags: [发布, 发需求, 创建需求, 发单]
    related: [how-to-review, how-to-cancel, circle-demand]

    answer:
      summary: "进入发布页 → 填标题/描述/预算/分类 → 选择服务方式 → 设置有效期 → 提交审核"
      preconditions:
        - "认证等级 != NONE"
        - "无 FROZEN 状态需求"
        - "标题 2-100 字"
        - "描述 2-2000 字"
        - "预算 1-999,999 元"
        - "有效期 1-30 天"
      steps:
        - title: 进入发布页
          action: navigate /demands/create
          params: {}
        - title: 填写标题
          action: input title
          params: { field: title, type: string, min: 2, max: 100, tip: "简洁明了地描述需求" }
        - title: 填写描述
          action: input description
          params: { field: description, type: string, min: 2, max: 2000, tip: "越详细越容易匹配到合适的服务方" }
        - title: 设置预算
          action: input minPrice
          params: { field: minPrice, type: number, min: 1, max: 999999, unit: 元 }
        - title: 选择分类
          action: select category
          params: { auto: "AI 根据标题和描述推荐", manual: true }
        - title: 选择服务方式
          action: select serviceType
          params: { options: ["ONLINE", "OFFLINE"] }
        - title: 设置有效期
          action: input expireDays
          params: { field: expireDays, type: number, min: 1, max: 30, default: 7, unit: 天 }
        - title: 提交发布
          action: submit
          params: {}
          result: "进入审核状态 (PENDING)"
      warnings:
        - type: warning
          content: "账户冻结状态无法发布新需求"
        - type: info
          content: "圈内发布：进入圈子详情页后发布，该需求只在圈内展示"
      examples:
        - query: "发布王者荣耀代打需求，预算 200，有效期 3 天"
          params: { title: "王者荣耀代打需求", serviceType: ONLINE, minPrice: 200, expireDays: 3 }
        - query: "帮我发一个找平面设计师的需求"
          params: { category: "设计", serviceType: ONLINE }

  - id: how-to-review
    category: demand
    tags: [审核, 审核时间, 通过, 审核中, 等待]
    related: [how-to-publish, my-demands-manage]

    answer:
      summary: "自动审核秒级到分钟级完成；人工复核需 1-2 个工作日"
      flow:
        - type: auto
          description: "敏感词检测 + 内容合规校验"
          duration: "秒 ~ 分钟"
        - type: manual
          trigger: "敏感词标记或系统无法自动判断"
          duration: "1-2 个工作日"
          notification: "消息通知发送审核结果"
      constraints:
        - "标题和描述中避免敏感词可加快自动审核"
        - "审核通过后若被举报违规，仍可能被冻结或下架"
      status_inspection:
        - page: /my-demands
          field: status
          values:
            PENDING: "审核中"
            ACTIVE: "已通过"
            FROZEN: "已冻结"

  - id: how-to-cancel
    category: demand
    tags: [取消, 下架, 删除需求, 撤回]
    related: [my-demands-manage]

    answer:
      summary: "在我的需求中找到目标需求 → 详情页底部「下架需求」"
      steps:
        - action: navigate /my-demands
        - action: click demand -> detail
        - action: click '下架需求' -> confirm
      warnings:
        - type: warning
          content: "下架后需求不可恢复。建议考虑修改而非直接下架"
        - type: tip
          content: "已过期需求自动下架，无需手动操作"
      constraints:
        - "已有人申请的需求建议先沟通"

  - id: my-demands-manage
    category: demand
    tags: [我的需求, 已发布, 管理需求, 需求列表]
    related: [how-to-cancel, order-lifecycle]

    answer:
      summary: "导航到 /my-demands → 查看所有需求列表+状态标签 → 点击进入详情管理申请"
      feature:
        page: /my-demands
        status_labels:
          PENDING: "审核中"
          ACTIVE: "已上架"
          WITHDRAWN: "已下架"
          COMPLETED: "已完成"
          FROZEN: "已冻结"
          IN_PROGRESS: "进行中"
        actions_on_detail:
          - "查看申请人列表 (V1 和 V2)"
          - "接受/拒绝申请人"
          - "下架需求"
      lifecycle:
        - "发布 → 审核中 → 已上架 → (有人申请) → 创建订单 → 完成 → 评价"

  # ═══════════════════════════════════════════════════════════════════════════
  #  发现与匹配
  # ═══════════════════════════════════════════════════════════════════════════

  - id: how-to-find
    category: discover
    tags: [找需求, 接单, 匹配, 发现, 搜索需求, 接活]
    related: [how-to-tags, what-is-cardpool, how-to-apply]

    answer:
      summary: "发现页提供三种模式：遇见(AI搜索)、寻觅(标签筛选)、探索(分类浏览)"
      modes:
        - name: 遇见
          action: "首屏搜索框输入关键词"
          engine: "AI 分析意图匹配需求"
          display: "玻璃卡片展现，可滑动浏览"
          example: "输入'王者荣耀 陪玩' → AI 匹配相关需求"
        - name: 寻觅
          action: "输入标签关键词按回车添加"
          engine: "标签精确筛选"
          display: "需求列表实时更新，每页 12 条"
          feature: "支持多标签组合筛选"
        - name: 探索
          status: building
          description: "按服务类别分栏浏览"
      tips:
        - "自然语言搜索效果优于单一关键词"
        - "Ask AI 搜索自动生成标签并同步到寻觅区域"

  - id: how-to-apply
    category: discover
    tags: [申请, 接单, 抢单, 承接, 报名]
    related: [credit-system, order-lifecycle, how-to-contact]

    answer:
      summary: "发现页点击需求卡片 → 详情页 → 「申请接单」"
      steps:
        - action: "点击需求卡片进入详情"
        - action: "阅读需求细节（描述、预算、截止时间）"
        - action: "点击「申请接单」→ 系统创建私信对话"
        - action: "等待需求方审核回应"
      tips:
        - "附上自我介绍和经验说明能提高被接受概率"
        - "每个用户有抢单信用额度限制"
        - "频繁申请后不履约将影响信用分"
      constraints:
        - "不能申请自己的需求"
        - "不能重复申请同一需求"
        - "已满员的需求不接受新申请"

  - id: how-to-tags
    category: discover
    tags: [标签, 筛选, 寻觅, 关键词]
    related: [how-to-find]

    answer:
      summary: "寻觅区域输入框输入关键词 → Enter 添加标签 → 实时筛选需求列表"
      steps:
        - action: "滚动到寻觅区域"
        - action: "输入关键词后按 Enter 添加为标签胶囊"
        - action: "可添加多个标签（系统按最后标签匹配）"
        - action: "点击标签 × 删除单个标签"
      params:
        tag_limit: 10
        match_mode: "模糊匹配"
        display: "每页 12 条，支持翻页"
      tips:
        - "模糊匹配：输入'王者'即可匹配'王者荣耀'"
        - "Ask AI 搜索自动生成的标签同步到寻觅区域"

  - id: what-is-discover-page
    category: discover
    tags: [发现页, 遇见, 寻觅, 星空, 玻璃卡片, 滑切]
    related: [how-to-tags, how-to-apply, what-is-cardpool]

    answer:
      summary: "沉浸式星空主题需求探索入口，集成 AI 搜索 + 标签筛选 + 分类浏览"
      modules:
        - "遇见: AI 智能搜索，自然语言匹配需求，玻璃卡片展示"
        - "寻觅: 标签精准筛选，多标签组合，每页 12 条"
        - "探索: 分类浏览（建设中）"
      card_interaction:
        - "点击进入详情页"
        - "上下滑切切换卡片"
        - "3D 翻转设计：正面封面+标题，背面完整描述"
      tips:
        - "自然语言搜索效果更好"

  - id: two-phase-ordering
    category: discover
    tags: [两段式, 接单, 申请, 审核, 筛选, 接受, 拒绝]
    related: [credit-system, order-lifecycle, how-to-apply]

    answer:
      summary: "两段式接单：Phase 1 发送申请 → Phase 2 需求方审核并接受/拒绝"
      phases:
        - phase: 1
          name: 发送请求
          action: "需求详情页点击「申请接单」→ 填写意向说明"
          cost: "消耗 1 抢单额度"
        - phase: 2
          name: 需求方审核
          action: "需求方在「我的需求」查看申请人列表"
          criteria:
            - "认证等级"
            - "过往评价"
            - "意向说明"
          outcomes:
            - "接受 → 创建担保订单"
            - "拒绝 → 不扣信用分"
      tips:
        - "需求方先筛选最合适的服务方再创建订单，减少盲目抢单导致的纠纷"
        - "若需求设置了 isCertifiedOnly，未认证用户无法申请"

  # ═══════════════════════════════════════════════════════════════════════════
  #  订单与支付
  # ═══════════════════════════════════════════════════════════════════════════

  - id: order-lifecycle
    category: order
    tags: [订单, 生命周期, 状态, 流程]
    related: [how-payment-works, order-dispute]

    answer:
      summary: "九木采用担保交易：创建订单 → 付款(平台托管) → 履约 → 验收 → 打款"
      lifecycle:
        - step: 创建订单
          status: PENDING
          description: "需求方接受申请后创建"
        - step: 需求方付款
          status: IN_PROGRESS
          description: "资金由平台托管"
        - step: 服务方履约
          status: IN_PROGRESS
          description: "双方可通过消息沟通进度"
        - step: 服务方提交完成
          status: WAITING_REVIEW
        - step: 需求方验收
          status: COMPLETED
          description: "平台将款项打给服务方"
        - step: 争议（可选）
          status: DISPUTED
          description: "平台客服介入"
      rules:
        - "验收期不主动确认 → 系统自动完成并打款"
        - "纠纷中 → 交易暂停，客服介入"
      related_pages: [orders, transactions]

  - id: how-payment-works
    category: order
    tags: [支付, 付款, 交易, 担保, 打款, 退款, 托管]
    related: [order-lifecycle, order-dispute]

    answer:
      summary: "需求方付款到平台托管 → 服务完成验收 → 平台打款给服务方"
      flow:
        - "订单创建 → 状态 PENDING"
        - "需求方点击「去支付」→ 完成付款"
        - "平台托管资金 → 状态 IN_PROGRESS"
        - "服务方开始工作"
        - "服务完成 → 需求方确认验收"
        - "平台打款给服务方 → 状态 COMPLETED"
      guarantees:
        - "服务方完成约定服务即可收到款项"
        - "需求方不满意可申请退款或纠纷介入"
      warnings:
        - type: danger
          content: "私下交易不受平台保护"

  - id: order-dispute
    category: order
    tags: [纠纷, 争议, 投诉, 维权, 退款, 客服]
    related: [how-payment-works, credit-system]

    answer:
      summary: "优先协商 → 申请纠纷介入 → 平台调查 → 裁决处理"
      steps:
        - action: "通过消息与对方友好协商"
        - action: "在订单详情页点击「申请纠纷介入」，提交证据（聊天记录、截图等）"
        - action: "平台客服查看双方证据，交易暂停"
        - action: "平台裁决：退款/继续履约/其他"
      tips:
        - "保留好沟通记录和服务交付证据"
        - "虚假纠纷申请会影响信用分"

  - id: how-transactions-work
    category: order
    tags: [交易, 记录, 结算, 明细, 账单, 收支]
    related: [how-payment-works, order-lifecycle]

    answer:
      summary: "/transactions → 查看所有已完成交易的结算明细"
      features:
        page: /transactions
        columns:
          - "交易金额"
          - "交易时间"
          - "对方信息"
          - "订单编号"
        detail_breakdown:
          - "服务费"
          - "平台抽成"
          - "实际到账金额"
        filters:
          - "时间范围"
          - "交易类型"
        export: "CSV 格式"

